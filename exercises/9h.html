<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input class="text-box" type="text" onkeyup="displayText();">
  <p class="paragraph"></p>

  <script>
    function displayText() {
      const textBox = document.querySelector('.text-box');
      document.querySelector('.paragraph').innerHTML = textBox.value;
    }
  </script>
</body>
</html>
